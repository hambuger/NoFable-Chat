<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NoFable Chat</title>
<!-- Markdown rendering and sanitization -->
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.12/dist/purify.min.js" integrity="sha384-piCcpDdJ7qVeK4Tv8Z6Hpcr3ZBIgP16TxQTPVfsLFdZ5uDgwc3Y8Ho7oUnqf12qu" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1f232c; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #8b93a1; --accent: #6ea8fe; --accent-2: #98d1a8;
    --user: #2b3a55; --code-bg: #0b0d12; --err: #ff8b8b; --think: #c9a877;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
    font-size: 14px; line-height: 1.6; display: flex; overflow: hidden;
  }

  /* ---------- History sidebar with embedded settings ---------- */
  aside#historybar {
    width: 260px; flex: 0 0 260px; background: var(--panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    transition: margin-left .2s ease; overflow: hidden;
  }
  aside#historybar.collapsed { margin-left: -260px; }
  aside#historybar header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 700; }
  aside#historybar header .title-text { flex: 1; }
  .sidebar-close { display: none; }
  aside#historybar .hlist { flex: 1; overflow-y: auto; padding: 8px; min-height: 60px; }
  .hitem {
    display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 8px;
    cursor: pointer; color: var(--text); margin-bottom: 2px; border: 1px solid transparent; position: relative;
  }
  .hitem:hover { background: var(--panel-2); }
  .hitem.active { background: rgba(110,168,254,.10); border-color: rgba(110,168,254,.35); }
  .hitem .htext { flex: 1; min-width: 0; }
  .hitem .htitle { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hitem .htime { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .hitem .hdel {
    background: transparent; border: 0; color: var(--err); cursor: pointer; font-size: 12px;
    padding: 2px 5px; opacity: 0; transition: opacity .12s; flex: 0 0 auto;
  }
  .hitem:hover .hdel { opacity: .7; }
  .hitem .hdel:hover { opacity: 1; }
  .hempty { color: var(--muted); font-size: 12px; padding: 14px 10px; text-align: center; }

  /* Embedded settings panel: fixed at the bottom of the history sidebar, collapsed by default. */
  .settings-drawer {
    border-top: 1px solid var(--border); background: var(--bg);
    display: flex; flex-direction: column; max-height: 70vh; overflow: hidden;
  }
  .settings-drawer summary {
    list-style: none; cursor: pointer; padding: 11px 14px; font-size: 12px; font-weight: 700;
    color: var(--muted); display: flex; align-items: center; gap: 7px; user-select: none;
  }
  .settings-drawer summary::-webkit-details-marker { display: none; }
  .settings-drawer summary .gear { font-size: 14px; }
  .settings-drawer summary .arrow { transition: transform .15s; margin-left: auto; }
  .settings-drawer[open] summary .arrow { transform: rotate(90deg); }
  .settings-drawer summary:hover { color: var(--text); }
  .settings-drawer .body { padding: 4px 14px 14px; overflow-y: auto; max-height: calc(70vh - 46px); }
  .new-chat-btn-top {
    background: var(--accent); border: 1px solid var(--accent); color: #0b0d12;
    border-radius: 8px; padding: 8px 10px; cursor: pointer; font: inherit; font-weight: 600; font-size: 13px; width: 100%;
    text-align: center; margin-bottom: 8px;
  }
  .new-chat-btn-top:hover { filter: brightness(1.08); }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 14px 0 8px; }
  .section-title:first-child { margin-top: 0; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 7px 9px; font: inherit; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .btn { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 12px; cursor: pointer; font: inherit; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #0b0d12; font-weight: 600; }
  .btn.danger { border-color: #5a3030; color: var(--err); }
  .btn.small { padding: 4px 8px; font-size: 12px; }
  .row { display: flex; gap: 8px; }
  .row .grow { flex: 1; }
  .switch { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; user-select: none; }
  .switch input { display: none; }
  .switch .track { width: 36px; height: 20px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; position: relative; transition: .15s; flex: 0 0 36px; }
  .switch .track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--muted); border-radius: 50%; transition: .15s; }
  .switch input:checked + .track { background: #1d3358; border-color: var(--accent); }
  .switch input:checked + .track::after { left: 18px; background: var(--accent); }
  .switch .lbl { font-size: 13px; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* Model cards */
  .mcard { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 9px; margin-bottom: 9px; }
  .mhead { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
  .mhead select { flex: 1; min-width: 90px; padding: 5px 6px; }
  .mini { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .mini input { width: auto; margin: 0; }
  .mini.think input:checked + span { color: var(--think); }
  .mini.search input:checked + span { color: var(--accent); }
  .agg-pick { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .agg-pick input { width: auto; margin: 0; }
  .mcard input[type=text], .mcard input[type=password] { padding: 5px 8px; font-size: 12.5px; margin-bottom: 5px; }
  .mcard input:last-child { margin-bottom: 0; }
  .del { background: transparent; border: 0; color: var(--err); cursor: pointer; font-size: 14px; padding: 2px 6px; opacity: .6; margin-left: auto; }
  .del:hover { opacity: 1; }

  /* ---------- Main area ---------- */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  main > header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--panel); }
  main > header .title { font-weight: 700; }
  main > header .sub { color: var(--muted); font-size: 12px; }
  main > header .spacer { flex: 1; }
  #toggleSidebar, .icon-btn { font-size: 18px; line-height: 1; padding: 4px 9px; }
  .new-chat-btn { font-size: 13px; padding: 6px 12px; }

  #messages { flex: 1; overflow-y: auto; padding: 20px 0; scroll-behavior: smooth; }
  .msg { padding: 10px 22px; max-width: 920px; margin: 0 auto; width: 100%; }
  .msg.user { display: flex; justify-content: flex-end; }
  .msg.user .bubble { background: var(--user); border: 1px solid #3a4f72; border-radius: 14px 14px 4px 14px; padding: 9px 14px; max-width: 78%; white-space: pre-wrap; word-break: break-word; }
  .moa-block { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .moa-block .final { padding: 6px 16px 14px; }
  .moa-block .final .who { font-size: 12px; color: var(--accent-2); font-weight: 600; margin: 10px 0 4px; }
  .layer { border-top: 1px solid var(--border); }
  .layer > summary { cursor: pointer; padding: 9px 16px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; list-style: none; }
  .layer > summary::-webkit-details-marker { display: none; }
  .layer > summary .arrow { transition: transform .15s; }
  .layer[open] > summary .arrow { transform: rotate(90deg); }
  .layer .cards { display: flex; gap: 10px; padding: 4px 16px 14px; overflow-x: auto; scroll-behavior: smooth; }
  .layer .cards > .card { flex: 0 0 280px; min-width: 280px; max-width: 360px; }
  .card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .card .name { font-size: 11px; color: var(--accent); margin-bottom: 6px; word-break: break-all; }
  .card .out { font-size: 13px; }
  .card.agg { border-color: var(--accent-2); box-shadow: 0 0 0 1px rgba(152,209,168,.25); }
  .card.agg .name { color: var(--accent-2); }
  .agg-tag { font-size: 9px; background: var(--accent-2); color: #0b0d12; padding: 1px 5px; border-radius: 3px; font-weight: 700; vertical-align: 1px; margin-left: 4px; }
  .running { color: var(--muted); font-size: 12px; }
  .running .spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -1px; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: var(--err); font-size: 12px; }
  /* Custom scrollbars */
  #messages, aside#historybar .hlist, .settings-drawer .body, .layer .cards, .md pre { scrollbar-width: thin; scrollbar-color: #3a4252 transparent; }
  #messages::-webkit-scrollbar, aside#historybar .hlist::-webkit-scrollbar, .settings-drawer .body::-webkit-scrollbar, .layer .cards::-webkit-scrollbar, .md pre::-webkit-scrollbar { width: 8px; height: 8px; }
  #messages::-webkit-scrollbar-track, aside#historybar .hlist::-webkit-scrollbar-track, .settings-drawer .body::-webkit-scrollbar-track, .layer .cards::-webkit-scrollbar-track, .md pre::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb, aside#historybar .hlist::-webkit-scrollbar-thumb, .settings-drawer .body::-webkit-scrollbar-thumb, .layer .cards::-webkit-scrollbar-thumb, .md pre::-webkit-scrollbar-thumb { background: #2e3543; border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  #messages::-webkit-scrollbar-thumb:hover, aside#historybar .hlist::-webkit-scrollbar-thumb:hover, .settings-drawer .body::-webkit-scrollbar-thumb:hover, .layer .cards::-webkit-scrollbar-thumb:hover { background: #3a4252; background-clip: content-box; }

  /* Softer separation between layers and cards */
  .layer > summary { border-radius: 0; }

  /* Hide intermediate process */
  #messages.hide-process .layer { display: none; }

  /* Reasoning blocks */
  .think { border: 1px dashed #4a4030; border-radius: 6px; padding: 6px 10px; margin: 6px 0; background: rgba(201,168,119,.05); }
  .think > summary { cursor: pointer; font-size: 11px; color: var(--think); list-style: none; display: flex; align-items: center; gap: 5px; }
  .think > summary::-webkit-details-marker { display: none; }
  .think > summary .arrow { transition: transform .15s; }
  .think[open] > summary .arrow { transform: rotate(90deg); }
  .think .think-body { margin-top: 6px; font-size: 12.5px; color: var(--muted); white-space: pre-wrap; word-break: break-word; }
  .think .think-body.md { white-space: normal; }
  .think .think-body.md p:first-child { margin-top: 0; }
  .think .think-body.md p:last-child { margin-bottom: 0; }

  /* Tool call chips */
  .tool-chip { border: 1px solid #2a4252; border-radius: 6px; background: rgba(110,168,254,.06); margin: 6px 0; }
  .tool-chip > summary { list-style: none; cursor: pointer; padding: 6px 10px; font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--accent); }
  .tool-chip > summary::-webkit-details-marker { display: none; }
  .tool-chip .tool-name { font-weight: 600; }
  .tool-chip .tool-args { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .tool-chip .tool-status { color: var(--accent-2); }
  .tool-chip.running > summary .tool-status { color: var(--think); }
  .tool-chip .tool-body { padding: 6px 10px 8px; }
  .tool-chip .tool-sec { margin-bottom: 6px; }
  .tool-chip .tool-sec-h { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .tool-chip .tool-pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; font-size: 11px; color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto; margin: 0; }

  .md p:first-child { margin-top: 0; } .md p:last-child { margin-bottom: 0; }
  .md pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; }
  .md code { font-family: "SF Mono", Consolas, Menlo, monospace; font-size: 12.5px; }
  .md :not(pre) > code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; }
  .md ul, .md ol { margin: 6px 0; padding-left: 22px; }
  .md a { color: var(--accent); }
  .md table { border-collapse: collapse; margin: 6px 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 4px 8px; }
  .md blockquote { border-left: 3px solid var(--border); margin: 6px 0; padding: 2px 12px; color: var(--muted); }

  /* Composer */
  footer { border-top: 1px solid var(--border); background: var(--panel); padding: 12px 18px; }
  .composer { max-width: 920px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
  .composer textarea { min-height: 44px; max-height: 200px; border-radius: 10px; }
  .composer .btn { height: 44px; min-width: 88px; white-space: nowrap; }
  #send[disabled] { opacity: .5; cursor: not-allowed; }

  #sidebarBackdrop { display: none; }

  @media (max-width: 760px) {
    html, body { height: 100dvh; min-height: 100dvh; }
    body { display: block; width: 100%; position: relative; }
    aside#historybar {
      position: fixed; inset: 0 auto 0 0; z-index: 30;
      width: min(88vw, 340px); max-width: 340px; height: 100dvh;
      transform: translateX(-100%); transition: transform .22s ease;
      margin-left: 0; box-shadow: 18px 0 40px rgba(0,0,0,.35);
    }
    aside#historybar.collapsed { margin-left: 0; }
    body.sidebar-open aside#historybar { transform: translateX(0); }
    .sidebar-close {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; padding: 0; font-size: 18px; line-height: 1;
    }
    #sidebarBackdrop {
      display: block; position: fixed; inset: 0; z-index: 20;
      background: rgba(0,0,0,.45); opacity: 0; pointer-events: none;
      transition: opacity .18s ease;
    }
    body.sidebar-open #sidebarBackdrop { opacity: 1; pointer-events: auto; }
    main { height: 100dvh; width: 100%; min-width: 0; }
    main > header {
      padding: 10px 12px; gap: 8px; min-height: 54px;
      position: relative; z-index: 1;
    }
    main > header .title { font-size: 14px; line-height: 1.25; }
    main > header .sub {
      max-width: 48vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.25;
    }
    #toggleHistory { min-width: 40px; height: 36px; padding: 4px 9px; }
    .new-chat-btn { min-width: 0; padding: 6px 9px; font-size: 12px; }
    .hitem .hdel { opacity: .75; padding: 4px 7px; }
    #messages { padding: 12px 0; }
    .msg { padding: 8px 10px; max-width: none; }
    .msg.user .bubble { max-width: 90%; padding: 8px 12px; border-radius: 12px 12px 4px 12px; }
    .moa-block { border-left: 0; border-right: 0; border-radius: 0; }
    .moa-block .final { padding: 6px 12px 12px; }
    .layer > summary { padding: 9px 12px; }
    .layer .cards { padding: 4px 12px 12px; gap: 8px; scroll-padding: 12px; }
    .layer .cards > .card { flex: 0 0 calc(100vw - 44px); min-width: calc(100vw - 44px); max-width: calc(100vw - 44px); }
    .card { padding: 9px 10px; }
    .settings-drawer { max-height: 68dvh; }
    .settings-drawer .body { max-height: calc(68dvh - 46px); }
    .mhead { gap: 5px; }
    .mhead select { min-width: 120px; }
    footer { padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); }
    .composer { max-width: none; gap: 7px; }
    .composer textarea { min-height: 42px; max-height: 150px; }
    .composer .btn { min-width: 62px; height: 42px; padding: 7px 10px; }
    .md table { display: block; max-width: 100%; overflow-x: auto; }
    .tool-chip > summary { align-items: flex-start; }
    .tool-chip .tool-args { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  }

  @media (max-width: 420px) {
    main > header .sub { display: none; }
    .new-chat-btn { padding: 6px 8px; }
  }
</style>
</head>
<body>

<aside id="historybar">
  <header>
    <span class="title-text" data-i18n="history">对话历史</span>
    <button class="btn sidebar-close" id="closeHistory" title="Close sidebar">×</button>
  </header>
  <div class="hlist" id="historyList">
    <button class="new-chat-btn-top" id="newChatTop" data-i18n="newChat">+ 新对话</button>
    <div class="hempty" id="historyEmpty" data-i18n="noHistory">暂无历史</div>
  </div>

  <details class="settings-drawer" id="settingsDrawer">
    <summary><span class="gear">⚙</span><span data-i18n="settings">设置</span><span class="arrow">▸</span></summary>
    <div class="body" id="settingsBody">

      <div class="section-title" data-i18n="modelConfig">模型配置（每行一个模型）</div>
      <div id="modelTable"></div>
      <button class="btn small" id="addModel" style="margin-bottom:6px;" data-i18n="addModel">+ 添加模型</button>

      <div class="section-title" data-i18n="runParams">运行参数</div>
      <div class="row">
        <div class="grow">
          <label class="hint" style="display:block;margin-bottom:4px;" data-i18n="layersLabel">Layers（层数，参考层 = 层数-1）</label>
          <input type="number" id="layers" step="1" min="2" max="6" value="2" />
        </div>
      </div>

      <label class="switch">
        <input type="checkbox" id="showProcess" checked />
        <span class="track"></span>
        <span class="lbl" data-i18n="showProcess">显示中间参考模型回答</span>
      </label>

      <div class="section-title" data-i18n="webSearchTool">网页搜索工具 (Firecrawl)</div>
      <input type="password" id="firecrawlKey" placeholder="Firecrawl API Key（留空则不启用）" data-i18n-ph="firecrawlKeyPh" />
      <div class="hint" style="margin:4px 0 0;" data-i18n="firecrawlHint">在需要搜索的模型行勾选「搜索」即可使用；未填 Key 时即使勾选也不启用。</div>

    </div>
  </details>
</aside>

<main>
  <header>
    <button class="btn" id="toggleHistory" title="历史侧栏">☰</button>
    <div>
      <div class="title" data-i18n="appTitle">NoFable Chat</div>
      <div class="sub" id="statusLine" data-i18n="notConfigured">未配置</div>
    </div>
    <div class="spacer"></div>
    <button class="btn new-chat-btn" id="newChat" data-i18n="newChat">新对话</button>
  </header>

  <div id="messages"></div>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="输入指令…  (Enter 发送 / Shift+Enter 换行)" rows="1" data-i18n-ph="inputPlaceholder"></textarea>
      <button class="btn primary" id="send" data-i18n="send">发送</button>
    </div>
  </footer>
</main>
<div id="sidebarBackdrop" aria-hidden="true"></div>

<script>
"use strict";

/* ============================ I18n ============================ */
// Detect browser language: Chinese (zh) uses Chinese copy; all other languages use English.
const I18N_ZH = {
  appTitle: "NoFable Chat",
  notConfigured: "未配置",
  newChat: "新对话",
  newChatPlus: "+ 新对话",
  history: "对话历史",
  noHistory: "暂无历史",
  settings: "设置",
  modelConfig: "模型配置（每行一个模型）",
  addModel: "+ 添加模型",
  runParams: "运行参数",
  layersLabel: "Layers（层数，参考层 = 层数-1）",
  showProcess: "显示中间参考模型回答",
  send: "发送",
  inputPlaceholder: "输入指令…  (Enter 发送 / Shift+Enter 换行)",
  newConvTitle: "新对话",
  refLayer: "参考层",
  refLayerRunning: (n) => `参考层 · 并发 ${n} 模型…`,
  refLayerDone: (i) => `参考层 ${i} ✓`,
  finalAnswer: "最终聚合答案",
  thinking: "思考过程",
  generating: "生成中…",
  aggregating: "聚合中…",
  noAnswer: "(模型未返回答案)",
  callFailed: (m) => `调用失败: ${m}`,
  aggError: (m) => `聚合模型错误: ${m}`,
  runError: (m) => `运行错误: ${m}`,
  configIncomplete: (v) => `配置不完整：${v || "?"} 行缺少 baseUrl/apiKey/模型名`,
  keepOneModel: "至少保留一个模型",
  generatingWait: "当前正在生成，请稍候",
  deleteConvConfirm: "删除该对话？此操作不可撤销。",
  relTimeJust: "刚刚",
  relTimeMin: (m) => `${m} 分钟前`,
  relTimeHour: (h) => `${h} 小时前`,

function syncCfg() {
  const cards = [...elModelTable.querySelectorAll(".mcard")];
  cfg.rows = cards.map(c => ({
    vendor: c.querySelector(".vendor").value,
    baseUrl: c.querySelector(".f-baseUrl").value.trim(),
    apiKey: c.querySelector(".f-apiKey").value.trim(),
    model: c.querySelector(".f-model").value.trim(),

    search: c.querySelector(".f-search").checked,
  }));
  const checked = elModelTable.querySelector('input[name="agg"]:checked');
  cfg.aggIndex = checked ? cards.indexOf(checked.closest(".mcard")) : 0;
  if (cfg.aggIndex < 0 || cfg.aggIndex >= cfg.rows.length) cfg.aggIndex = 0;
  cfg.layers = Math.min(6, Math.max(2, parseInt(elLayers.value) || 2));
  cfg.showProcess = elShowProcess.checked;
  cfg.firecrawlKey = (elFirecrawlKey ? elFirecrawlKey.value.trim() : cfg.firecrawlKey);
  elMessages.classList.toggle("hide-process", !cfg.showProcess);
}

function addModel() {
  syncCfg();
  cfg.rows.push({ vendor: "deepseek", baseUrl: VENDORS.deepseek.baseUrl, apiKey: "", model: VENDORS.deepseek.model, thinking: false, search: false });
  renderTable(); saveConfig(); updateStatus();
}

function deleteModel(idx) {
  syncCfg();
  if (cfg.rows.length <= 1) { alert(T.keepOneModel); return; }
  cfg.rows.splice(idx, 1);
  if (idx < cfg.aggIndex) cfg.aggIndex--;
  if (cfg.aggIndex >= cfg.rows.length) cfg.aggIndex = cfg.rows.length - 1;
  if (cfg.aggIndex < 0) cfg.aggIndex = 0;
  renderTable(); saveConfig(); updateStatus();
}

/* ============================ Persistence ============================ */
function saveConfig() {
  try {
    localStorage.setItem(CONFIG_KEY, JSON.stringify({
      rows: cfg.rows, aggIndex: cfg.aggIndex, layers: cfg.layers, showProcess: cfg.showProcess, firecrawlKey: cfg.firecrawlKey
    }));
  } catch (e) { console.warn("Failed to save config", e); }
}
function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (!raw) return false;
    const obj = JSON.parse(raw);
    if (Array.isArray(obj.rows) && obj.rows.length) {
      cfg.rows = obj.rows.map(r => ({ search: false, ...r }));  // Backfill search:false for older saved configs.
      cfg.aggIndex = Math.min(obj.aggIndex ?? 0, cfg.rows.length - 1);
      cfg.layers = Math.min(6, Math.max(2, parseInt(obj.layers) || 2));
      cfg.showProcess = obj.showProcess ?? true;
      cfg.firecrawlKey = obj.firecrawlKey ?? "";
      return true;
    }
  } catch (e) { console.warn("Failed to load config", e); }
  return false;
}

/* ============================ Conversation persistence ============================ */
function currentConv() { return conversations.find(c => c.id === currentId) || null; }

function persistConversations() {
  // Quota handling: drop the oldest non-current conversations and retry.
  for (let attempt = 0; attempt < conversations.length; attempt++) {
    try {
      localStorage.setItem(CONV_KEY, JSON.stringify(conversations));
      localStorage.setItem(CUR_CONV_KEY, currentId || "");
      return;
    } catch (e) {
      if (e && (e.name === "QuotaExceededError" || e.code === 22)) {
        // Drop the oldest non-current conversation.
        const others = conversations.filter(c => c.id !== currentId);
        if (!others.length) { console.warn("localStorage is full and no non-current conversations can be dropped; the current conversation may not be fully saved", e); return; }
        others.sort((a, b) => a.updatedAt - b.updatedAt);
        const dropId = others[0].id;
        conversations = conversations.filter(c => c.id !== dropId);
        console.warn("localStorage quota exceeded; dropped oldest conversation:", dropId);
        renderHistoryList();
        continue;
      }
      console.warn("Failed to save conversations", e);
      return;
    }
  }
  console.warn("Failed to save conversations after retry limit");
}
function loadConversations() {
  try {
    const raw = localStorage.getItem(CONV_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length) {
        conversations = arr;
        const savedCur = localStorage.getItem(CUR_CONV_KEY);
        currentId = (savedCur && conversations.some(c => c.id === savedCur)) ? savedCur : conversations[0].id;
        return true;
      }
    }
  } catch (e) { console.warn("Failed to load conversations", e); }
  return false;
}

function newConversation() {
  const now = Date.now();
  const conv = {
    id: "c" + now.toString(36) + Math.random().toString(36).slice(2, 6),
    title: T.newConvTitle,
    turns: [],
    createdAt: now,
    updatedAt: now,
  };
  conversations.unshift(conv);
  currentId = conv.id;
  messageList = [];
  elMessages.innerHTML = "";
  persistConversations();
  renderHistoryList();
  collapseSettingsDrawer();   // Collapse settings when starting a new conversation.
  closeMobileSidebar();
  elInput.focus();
  return conv;
}

function switchConversation(id) {
  if (busy) { alert(T.generatingWait); return; }
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentId = id;
  rebuildMessageList();
  renderConversation(conv);
  renderHistoryList();
  persistConversations();
  collapseSettingsDrawer();   // Collapse settings when switching conversations.
  closeMobileSidebar();
  elInput.focus();
}

function deleteConversation(id) {
  if (busy) { alert(T.generatingWait); return; }
  if (!confirm(T.deleteConvConfirm)) return;
  const idx = conversations.findIndex(c => c.id === id);
  if (idx < 0) return;
  conversations.splice(idx, 1);
  if (currentId === id) {
    if (conversations.length) {
      currentId = conversations[0].id;
      rebuildMessageList();
      renderConversation(currentConv());
    } else {
      newConversation();
      return; // newConversation already rendered and persisted.
    }
  }
  persistConversations();
  renderHistoryList();
  closeMobileSidebar();
}

// Append one turn to the current conversation, then update its title and timestamp.
function appendTurnToCurrent(turn) {
  const conv = currentConv();
  if (!conv) return;
  if (conv.turns.length === 0 && turn.user) {
    conv.title = turn.user.length > 24 ? turn.user.slice(0, 24) + "…" : turn.user;
  }
  conv.turns.push(turn);
  conv.updatedAt = Date.now();
  // Keep conversations sorted by updatedAt descending by moving the current one to the top.
  conversations = conversations.filter(c => c.id !== conv.id);
  conversations.unshift(conv);
  persistConversations();
  renderHistoryList();
}

// Rebuild messageList from the current conversation turns. Turns are the single source of truth.
function rebuildMessageList() {
  const conv = currentConv();
  messageList = [];
  if (!conv) return;
  for (const t of conv.turns) {
    messageList.push({ role: "user", content: t.user });
    if (t.final && t.final.content) {
      messageList.push({ role: "assistant", content: t.final.content });
    }
  }
}

// Relative time copy.
function relTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return T.relTimeJust;
  if (m < 60) return T.relTimeMin(m);
  const h = Math.floor(m / 60);
  if (h < 24) return T.relTimeHour(h);
  const d = Math.floor(h / 24);
  if (d < 7) return T.relTimeDay(d);
  const dt = new Date(ts);
  return `${dt.getMonth() + 1}/${dt.getDate()}`;
}

function updateStatus() {
  const rows = cfg.rows;
  const allFilled = rows.every(r => r.baseUrl && r.apiKey && r.model);
  const agg = rows[cfg.aggIndex];
  elStatus.textContent = allFilled && agg
    ? `${rows.length} ${T.modelsIncAgg} × ${cfg.layers} ${T.layersWord} → ${T.agg}: ${agg.vendor}/${agg.model}`
    : T.notConfigured;
}

/* ============================ History list rendering ============================ */
function renderHistoryList() {
  const list = $("historyList");
  const empty = $("historyEmpty");
  // Keep the top "New chat" button and remove only history items.
  [...list.querySelectorAll(".hitem")].forEach(n => n.remove());
  // conversations is already maintained in updatedAt descending order.
  if (!conversations.length) { empty.style.display = ""; return; }
  empty.style.display = "none";
  for (const conv of conversations) {
    const item = document.createElement("div");
    item.className = "hitem" + (conv.id === currentId ? " active" : "");
    item.dataset.id = conv.id;
    item.innerHTML = `
      <div class="htext">
        <div class="htitle">${esc(conv.title || T.newConvTitle)}</div>
        <div class="htime">${conv.turns.length ? T.roundsLabel(conv.turns.length) : ""}${relTime(conv.updatedAt)}</div>
      </div>
      <button class="hdel" title="${T.deleteConv}">✕</button>
    `;
    item.addEventListener("click", (e) => {
      if (e.target.closest(".hdel")) return;
      switchConversation(conv.id);
    });
    item.querySelector(".hdel").addEventListener("click", (e) => {
      e.stopPropagation();
      deleteConversation(conv.id);
    });
    list.appendChild(item);
  }
}

/* ============================ API calls ============================ */
// Build the request body: reasoning models skip temperature; GLM needs a thinking flag; tools are attached when enabled.
function buildBody(row, messages, stream, withTools) {
  const body = { model: row.model, messages };
  if (stream) body.stream = true;
  if (row.thinking) {
    // deepseek-reasoner / qwq / qwen3-reasoner and similar models may reject temperature, so omit it.
    if (row.vendor === "glm") body.thinking = { type: "enabled" };
    // Qwen3 chat models may support enable_thinking, while reasoner models generally enable it by default.
  } else {
    body.temperature = 0;
  }
  if (withTools && FIRECRAWL_TOOLS) {
    body.tools = FIRECRAWL_TOOLS;
    body.tool_choice = "auto";
  }
  return body;
}

// Web search tool definitions in OpenAI function-calling schema format.
const FIRECRAWL_TOOLS = [
  {
    type: "function",
    function: {
      name: "web_search",
      description: "Search the web for up-to-date information. Use this when the user asks about recent events, current facts, or anything beyond your training data. Returns a list of results with url/title/description.",
      parameters: {
        type: "object",
        properties: {
          query: { type: "string", description: "The search query." },
          limit: { type: "number", description: "Number of results to return (default 6, max 10)." },
        },
        required: ["query"],
      },
    },
  },
  {
    type: "function",
    function: {
      name: "fetch_page",
      description: "Fetch and read the full content (as markdown) of a specific web page URL. Use this after web_search when you need the detailed content of a particular result rather than just the snippet.",
      parameters: {
        type: "object",
        properties: {
          url: { type: "string", description: "The full URL of the page to fetch." },
        },
        required: ["url"],
      },
    },
  },
];

// Firecrawl calls: search and scrape share the same authorization header.
const FIRECRAWL_SEARCH = "https://api.firecrawl.dev/v2/search";
const FIRECRAWL_SCRAPE = "https://api.firecrawl.dev/v2/scrape";

function fmtSearchResults(data, maxItems) {
  const web = data?.data?.web || data?.web || [];
  const list = Array.isArray(web) ? web.slice(0, maxItems) : [];
  if (!list.length) return "(no results)";
  return list.map((r, i) =>
    `${i + 1}. ${r.title || ""}\n   URL: ${r.url || ""}\n   ${r.description || ""}`
  ).join("\n\n");
}
function fmtScrapeResult(data) {
  const md = data?.data?.markdown || data?.markdown || "";
  const meta = data?.data?.metadata || {};
  if (!md) return "(no content)";
  const head = `Title: ${meta.title || ""}\nURL: ${meta.sourceURL || meta.url || ""}\n\n`;
  // Truncate very long page content to avoid blowing up the model context.
  const MAX = 12000;
  return head + (md.length > MAX ? md.slice(0, MAX) + `\n…[truncated, ${md.length} chars total]` : md);
}

async function firecrawlSearch(query, limit) {
  const res = await fetch(FIRECRAWL_SEARCH, {
    method: "POST",
    headers: { "Authorization": `Bearer ${cfg.firecrawlKey}`, "Content-Type": "application/json" },
    body: JSON.stringify({ query, limit: Math.min(10, limit || 6), sources: ["web"] }),
  });
  const txt = await res.text();
  let data; try { data = JSON.parse(txt); } catch { throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`); }
  if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
  return fmtSearchResults(data, limit || 6);
}
async function firecrawlScrape(url) {
  const res = await fetch(FIRECRAWL_SCRAPE, {
    method: "POST",
    headers: { "Authorization": `Bearer ${cfg.firecrawlKey}`, "Content-Type": "application/json" },
    body: JSON.stringify({ url }),
  });
  const txt = await res.text();
  let data; try { data = JSON.parse(txt); } catch { throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`); }
  if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
  return fmtScrapeResult(data);
}

// Execute one tool call and return a string result.
async function executeToolCall(toolCall) {
  const fn = toolCall?.function || {};
  const name = fn.name;
  let args = {};
  if (fn.arguments) {
    try { args = JSON.parse(fn.arguments); } catch { args = {}; }
  }
  if (name === "web_search") return await firecrawlSearch(String(args.query || ""), Number(args.limit) || 6);
  if (name === "fetch_page") return await firecrawlScrape(String(args.url || ""));
  throw new Error(`Unknown tool: ${name}`);
}

// Streaming call used by both reference and aggregator models. It yields several event types:
//   {type:"content"/"reasoning", text}  streamed text
//   {type:"tool_calls", tool_calls}     tool calls requested by this model round
// Includes 429 backoff retry, HTML/error response detection, and streamed error detection.
async function* streamLLM(row, messages, withTools) {
  let res;
  for (const sleepSec of [1, 2, 4]) {
    res = await fetch(row.baseUrl, {
      method: "POST",
      headers: { "Authorization": `Bearer ${row.apiKey}`, "Content-Type": "application/json" },
      body: JSON.stringify(buildBody(row, messages, true, withTools)),
    });
    if (res.status === 429) {
      console.warn(`Rate limited on ${row.model}, retry in ${sleepSec}s…`);
      await new Promise(r => setTimeout(r, sleepSec * 1000));
      continue;
    }
    break;
  }
  const ct = res.headers.get("content-type") || "";
  if (!res.ok || ct.includes("text/html")) {
    const txt = await res.text().catch(() => "");
    if (/<!doctype|<html/i.test(txt) || ct.includes("text/html")) {
      throw new Error(T.baseUrlHtml.replace("{{status}}", res.status));
    }
    throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`);
  }
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  // Tool calls: accumulate index/arguments fragments from the OpenAI streaming protocol.
  const toolAcc = [];   // [{index, id, name, arguments}]
  let finishReason = null;
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split("\n");
    buf = lines.pop();
    for (const line of lines) {
      const t = line.trim();
      if (!t || !t.startsWith("data:")) continue;
      const payload = t.slice(5).trim();
      if (payload === "[DONE]") { finishReason = finishReason || "stop"; continue; }
      let json;
      try { json = JSON.parse(payload); } catch { continue; } // Ignore incomplete frames.
      if (json.error) throw new Error(json.error.message || JSON.stringify(json.error));
      const choice = json.choices?.[0];
      if (!choice) continue;
      const delta = choice.delta || {};
      if (delta.reasoning_content || delta.reasoning) {
        yield { type: "reasoning", text: delta.reasoning_content ?? delta.reasoning };
      }
      if (delta.content) yield { type: "content", text: delta.content };
      // Accumulate tool call fragments.
      if (Array.isArray(delta.tool_calls)) {
        for (const tc of delta.tool_calls) {
          const idx = (tc.index ?? 0);
          if (!toolAcc[idx]) toolAcc[idx] = { index: idx, id: tc.id || "", name: "", arguments: "" };
          if (tc.id) toolAcc[idx].id = tc.id;
          if (tc.function) {
            if (tc.function.name) toolAcc[idx].name = (toolAcc[idx].name || "") + tc.function.name;
            if (tc.function.arguments != null) toolAcc[idx].arguments += tc.function.arguments;
          }
        }
      }
      if (choice.finish_reason) finishReason = choice.finish_reason;
    }
  }
  // After the stream ends, yield tool calls once if any were collected.
  const finalTools = toolAcc.filter(Boolean).map(t => ({
    id: t.id || ("call_" + t.index),
    type: "function",
    function: { name: t.name, arguments: t.arguments || "" },
  }));
  if (finalTools.length) yield { type: "tool_calls", tool_calls: finalTools, finish_reason: finishReason };
}

// Agentic loop: stream once, execute requested tools, append results to messages,
// then continue until there are no tool calls or the safety limit is reached.
// MAX_LOOPS is only a guardrail against infinite loops and runaway cost.
// slot provides appendReasoning / appendContent / appendToolCall / done / setError hooks.
// Returns toolCallLog ({name,arguments,result,error}[]) for persistence.
async function runLLMAgentic(row, messages, withTools, slot, cardResult) {
  const MAX_LOOPS = 16;
  const toolCallLog = [];
  let loop = 0;
  while (loop < MAX_LOOPS) {
    loop++;
    let roundToolCalls = null;
    let roundContent = "";
    try {
      for await (const chunk of streamLLM(row, messages, withTools)) {
        if (chunk.type === "reasoning") {
          cardResult.reasoning += chunk.text;
          if (slot?.appendReasoning) slot.appendReasoning(chunk.text);
        } else if (chunk.type === "content") {
          cardResult.content += chunk.text;
          roundContent += chunk.text;
          if (slot?.appendContent) slot.appendContent(chunk.text);
        } else if (chunk.type === "tool_calls") {
          roundToolCalls = chunk.tool_calls;
        }
      }
    } catch (e) {
      cardResult.error = e.message;
      if (slot?.setError) slot.setError(e.message);
      throw e;
    }
    // No tool calls: this model round is complete.
    if (!withTools || !roundToolCalls || !roundToolCalls.length) break;
    // Execute all tool calls requested in this round. OpenAI-compatible APIs expect one assistant
    // message containing all tool_calls, followed by one tool message per call.
    messages.push({ role: "assistant", content: roundContent || "", tool_calls: roundToolCalls });
    for (const tc of roundToolCalls) {
      const name = tc.function.name;
      const argsStr = tc.function.arguments || "";
      let preview;
      try { preview = JSON.stringify(JSON.parse(argsStr)); } catch { preview = argsStr; }
      if (slot?.appendToolCall) slot.appendToolCall(name, preview, "running");
      let result, err = null;
      try { result = await executeToolCall(tc); }
      catch (e) { err = e.message; result = T.toolError(e.message); }
      toolCallLog.push({ name, arguments: argsStr, result: String(result).slice(0, 8000), error: err });
      if (slot?.appendToolCall) slot.appendToolCall(name, preview, "done", String(result));
      messages.push({ role: "tool", tool_call_id: tc.id, content: String(result) });
    }
    // Continue so the model can read tool results and stream another response.
  }
  return toolCallLog;
}

// A model row has web search enabled only when search is checked and firecrawlKey is present.
function rowSearchEnabled(row) {
  return !!(row.search && cfg.firecrawlKey);
}

/* ============================ MoA algorithm ============================ */
// results accepts either strings or cardResult objects; cardResult.content is used.
function getFinalSystemPrompt(systemPrompt, results, models) {
  const parts = results.map(r => (typeof r === "string" ? r : (r?.content || "")));
  return systemPrompt + "\n" + parts.map((r, i) => `${i + 1}. ${r}`).join("\n");
}

function getCurrentTimeContext() {
  const now = new Date();
  const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "local";
  const localTime = now.toLocaleString(undefined, {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false, timeZoneName: "short",
  });
  return `Current date and time: ${localTime}. Time zone: ${timeZone}. ISO timestamp: ${now.toISOString()}. Use this as the reference for relative dates such as today, tomorrow, yesterday, now, latest, or recent.`;
}

function withTimeContext(messages, systemPrompt) {
  const content = systemPrompt
    ? `${getCurrentTimeContext()}\n\n${systemPrompt}`
    : getCurrentTimeContext();
  return [{ role: "system", content }, ...messages];
}

async function runMoATurn(instruction, ui) {
  const rows = cfg.rows;
  const aggRow = rows[cfg.aggIndex];
  const layers = cfg.layers;

  // Persisted turn record: captures all layer/model results and the aggregator result.
  const turn = {
    user: instruction,
    refLayers: [],                 // [[cardResult,...], ...], length = layers - 1.
    agg: { vendor: aggRow.vendor, model: aggRow.model },
    final: { content: "", reasoning: "" },
    layersCount: layers,
  };

  messageList.push({ role: "user", content: instruction });

  let prev = null;                 // cardResult array; null for the first layer.
  const refLayerCount = layers - 1;
  for (let layer = 0; layer < refLayerCount; layer++) {
    ui.setLayerRunning(layer, rows.length);
    // Stream every model concurrently. Cards appear immediately with spinners,
    // and tokens stream into their own cards.
    // Layers have a barrier: the next layer's system prompt depends on all outputs from this layer.
    const tasks = rows.map(async (row, idx) => {
      const prevContents = prev ? prev.map(r => r?.content || "") : null;
      const messages = prevContents
        ? withTimeContext(messageList, getFinalSystemPrompt(AGG_SYSTEM, prevContents))
        : withTimeContext(messageList);
      const slot = ui.addCard(layer, idx, row, idx === cfg.aggIndex);
      const cardResult = {
        vendor: row.vendor, model: row.model, thinking: !!row.thinking,
        content: "", reasoning: "", error: "", isAgg: idx === cfg.aggIndex,
        search: rowSearchEnabled(row), toolCalls: [],
      };
      const withTools = rowSearchEnabled(row);
      try {
        cardResult.toolCalls = await runLLMAgentic(row, messages, withTools, slot, cardResult);
        if (slot?.done) slot.done();
      } catch (e) {
        cardResult.error = e.message;
        if (slot?.setError) slot.setError(e.message);
      }
      return cardResult;
    });
    prev = await Promise.all(tasks);
    turn.refLayers.push(prev.map(r => ({ ...r })));  // Store a shallow copy for persistence.
    ui.setLayerDone(layer);
  }

  const prevContents = prev ? prev.map(r => r?.content || "") : [];
  const aggMessages = withTimeContext(messageList, getFinalSystemPrompt(AGG_SYSTEM, prevContents));
  ui.setAggregatorRunning(aggRow);
  let finalText = "";
  let finalReasoning = "";
  const aggSlot = {
    appendReasoning: (t) => ui.appendReasoning(t),
    appendContent: (t) => { finalText += t; ui.appendFinal(t); },
    appendToolCall: (name, args, status, result) => ui.appendAggToolCall(name, args, status, result),
    setError: (m) => ui.setError(T.aggError(m)),
  };
  const aggCardResult = { content: "", reasoning: "", error: "", toolCalls: [] };
  const withAggTools = rowSearchEnabled(aggRow);
  try {
    aggCardResult.toolCalls = await runLLMAgentic(aggRow, aggMessages, withAggTools, aggSlot, aggCardResult);
    finalReasoning = aggCardResult.reasoning;
  } catch (e) {
    turn.final.error = e.message;
    ui.setError(T.aggError(e.message));
  }
  turn.final.content = finalText;
  turn.final.reasoning = finalReasoning;
  turn.final.toolCalls = aggCardResult.toolCalls || [];
  ui.finalDone();

  if (finalText) {
    messageList.push({ role: "assistant", content: finalText });
  }
  // Persist this turn to the current conversation and refresh the history list.
  appendTurnToCurrent(turn);
  return finalText;
}

/* ============================ UI rendering ============================ */
marked.setOptions({ breaks: true, gfm: true });
function md(t) { return DOMPurify.sanitize(marked.parse(t)); }

function addUserMessage(text) {
  const wrap = document.createElement("div");
  wrap.className = "msg user";
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  wrap.appendChild(b);
  elMessages.appendChild(wrap);
  scrollDown();
}

function rowLabel(row) {
  const tTag = row.thinking ? " �" : "";
  const sTag = row.search ? " �" : "";
  return `${row.vendor} · ${row.model}${tTag}${sTag}`;
}

// Tool call chip: collapsible args/result display. status: "running"|"done".
function makeToolChip(name, argsPreview, status, resultText) {
  const det = document.createElement("details");
  det.className = "tool-chip " + (status || "done");
  const labelMap = { web_search: T.toolWebSearch, fetch_page: T.toolFetchPage };
  const label = labelMap[name] || name;
  det.innerHTML = `<summary><span class="tool-ic">�</span> <span class="tool-name">${esc(label)}</span> <span class="tool-args">${esc(argsPreview || "")}</span> <span class="tool-status">${status === "running" ? "…" : "✓"}</span></summary>
    <div class="tool-body">
      <div class="tool-sec"><div class="tool-sec-h">${T.toolArgs}</div><pre class="tool-pre">${esc(argsPreview || "")}</pre></div>
      ${resultText ? `<div class="tool-sec"><div class="tool-sec-h">${T.toolResult}</div><pre class="tool-pre">${esc(resultText)}</pre></div>` : ""}
    </div>`;
  if (status === "running") det.open = true;
  return det;
}
// Static version that returns HTML, used when rebuilding history.
function makeToolChipStatic(label, argsPreview, resultText, errorText) {
  const result = resultText || (errorText ? T.toolError(errorText) : "");
  return `<details class="tool-chip done"><summary><span class="tool-ic">�</span> <span class="tool-name">${esc(label)}</span> <span class="tool-args">${esc(argsPreview || "")}</span> <span class="tool-status">✓</span></summary>
    <div class="tool-body">
      <div class="tool-sec"><div class="tool-sec-h">${T.toolArgs}</div><pre class="tool-pre">${esc(argsPreview || "")}</pre></div>
      ${result ? `<div class="tool-sec"><div class="tool-sec-h">${T.toolResult}</div><pre class="tool-pre">${esc(result)}</pre></div>` : ""}
    </div></details>`;
}

function renderMoaBlock() {
  const block = document.createElement("div");
  block.className = "msg";
  const inner = document.createElement("div");
  inner.className = "moa-block";
  block.appendChild(inner);
  elMessages.appendChild(block);

  const layerEls = [];
  const layerCount = cfg.layers - 1;
  if (cfg.showProcess) {
    for (let i = 0; i < layerCount; i++) {
      const det = document.createElement("details");
      det.className = "layer";
      if (i === 0) det.open = true;
      const sum = document.createElement("summary");
      sum.innerHTML = `<span class="arrow">▸</span> <span class="txt">${T.refLayer} ${i + 1}</span>`;
      det.appendChild(sum);
      const cards = document.createElement("div");
      cards.className = "cards";
      // Shift + wheel scrolls horizontally; trackpads support native horizontal scrolling.
      cards.addEventListener("wheel", (e) => {
        if (e.shiftKey && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
          cards.scrollLeft += e.deltaY;
          e.preventDefault();
        }
      }, { passive: false });
      det.appendChild(cards);
      inner.appendChild(det);
      layerEls.push({ det, summary: sum, cards });
    }
  }

  const finalWrap = document.createElement("div");
  finalWrap.className = "final";
  finalWrap.innerHTML = `<div class="who">${T.finalAnswer}</div>`;

  // Aggregator reasoning block: hidden until it has content.
  const finalThink = document.createElement("details");
  finalThink.className = "think";
  finalThink.style.display = "none";
  finalThink.innerHTML = `<summary><span class="arrow">▸</span> ${T.thinking}</summary><div class="think-body"></div>`;
  finalWrap.appendChild(finalThink);

  const finalBody = document.createElement("div");
  finalBody.className = "md";
  finalWrap.appendChild(finalBody);
  inner.appendChild(finalWrap);

  // Collapse all reference layers above this block when the final answer area scrolls into view.
  setupAutoCollapseLayers(finalWrap, layerEls);

  scrollDown();

  return {
    setLayerRunning(layer, n) {
      if (!layerEls[layer]) return;
      layerEls[layer].summary.querySelector(".txt").innerHTML =
        `<span class="running"><span class="spinner"></span> ${T.refLayerRunning(n)}</span>`;
    },
    addCard(layer, idx, row, isAgg) {
      if (!layerEls[layer]) return null;
      const cards = layerEls[layer].cards;
      let card = cards.children[idx];
      if (!card) { card = document.createElement("div"); cards.appendChild(card); }
      card.className = "card" + (isAgg ? " agg" : "");
      const tag = isAgg ? ` <span class="agg-tag">${T.agg}</span>` : "";
      card.innerHTML =
        `<div class="name">${esc(rowLabel(row))}${tag}</div>` +
        `<div class="think-wrap"></div>` +
        `<div class="tools-wrap"></div>` +
        `<div class="out"><span class="running"><span class="spinner"></span> ${T.generating}</span></div>`;
      const out = card.querySelector(".out");
      const thinkWrap = card.querySelector(".think-wrap");
      const toolsWrap = card.querySelector(".tools-wrap");
      let contentBuf = "", thinkBody = null;
      scrollDown();
      return {
        appendReasoning(text) {
          if (!thinkBody) {
            const det = document.createElement("details");
            det.className = "think"; det.open = true;
            det.innerHTML = `<summary><span class="arrow">▸</span> ${T.thinking}</summary><div class="think-body"></div>`;
            thinkWrap.appendChild(det);
            thinkBody = det.querySelector(".think-body");
          }
          thinkBody.append(text);
          scrollDown();
        },
        appendContent(text) {
          const r = out.querySelector(".running");
          if (r) out.innerHTML = "";
          contentBuf += text;
          out.append(text);
          scrollDown();
        },
        appendToolCall(name, argsPreview, status, resultText) {
          toolsWrap.appendChild(makeToolChip(name, argsPreview, status, resultText));
          scrollDown();
        },
        done() {
          out.innerHTML = contentBuf.trim()
            ? md(contentBuf)
            : `<span class="err">${T.noAnswer}</span>`;
          if (thinkBody && thinkBody.textContent.trim()) thinkBody.innerHTML = md(thinkBody.textContent);
          scrollDown();
        },
        setError(msg) {
          out.innerHTML = `<span class="err">${T.callFailed(esc(msg))}</span>`;
          scrollDown();
        },
      };
    },
    setLayerDone(layer) {
      if (!layerEls[layer]) return;
      layerEls[layer].summary.querySelector(".txt").textContent = T.refLayerDone(layer + 1);
    },
    setAggregatorRunning(aggRow) {
      finalWrap.querySelector(".who").textContent = `${T.finalAnswer} · ${aggRow.vendor}/${aggRow.model}`;
      finalBody.innerHTML = `<span class="running"><span class="spinner"></span> ${T.aggregating}</span>`;
      scrollDown();
    },
    appendReasoning(text) {
      finalThink.style.display = "";
      finalThink.open = true;
      finalThink.querySelector(".think-body").append(text);
      scrollDown();
    },
    appendFinal(chunk) {
      const r = finalBody.querySelector(".running");
      if (r) finalBody.innerHTML = "";
      finalBody.append(chunk);
      scrollDown();
    },
    appendAggToolCall(name, argsPreview, status, resultText) {
      finalThink.insertAdjacentElement("afterend", makeToolChip(name, argsPreview, status, resultText));
      scrollDown();
    },
    finalDone() {
      finalBody.innerHTML = md(finalBody.textContent || "");
      const tb = finalThink.querySelector(".think-body");
      if (tb && tb.textContent) tb.innerHTML = md(tb.textContent);
      scrollDown();
    },
    setError(msg) {
      finalBody.innerHTML = `<span class="err">${esc(msg)}</span>`;
    },
  };
}

function updateMessageListPanel() {}

// Static rebuild: recreate DOM from persisted turn records when switching conversations.
function renderStaticTurn(turn) {
  addUserMessage(turn.user);

  const block = document.createElement("div");
  block.className = "msg";
  const inner = document.createElement("div");
  inner.className = "moa-block";
  block.appendChild(inner);
  elMessages.appendChild(block);

  const layerEls = [];
  const refLayers = turn.refLayers || [];
  if (cfg.showProcess) {
    for (let i = 0; i < refLayers.length; i++) {
      const det = document.createElement("details");
      det.className = "layer";
      det.open = false; // Old reference layers start collapsed so the final answer stays prominent.
      const sum = document.createElement("summary");
      sum.innerHTML = `<span class="arrow">▸</span> <span class="txt">${T.refLayer} ${i + 1}</span>`;
      det.appendChild(sum);
      const cards = document.createElement("div");
      cards.className = "cards";
      cards.addEventListener("wheel", (e) => {
        if (e.shiftKey && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
          cards.scrollLeft += e.deltaY; e.preventDefault();
        }
      }, { passive: false });
      det.appendChild(cards);
      inner.appendChild(det);
      layerEls.push({ det, summary: sum, cards });
    }
  }

  const finalWrap = document.createElement("div");
  finalWrap.className = "final";
  finalWrap.innerHTML = `<div class="who">${T.finalAnswer} · ${turn.agg?.vendor || ""}/${turn.agg?.model || ""}</div>`;

  // Aggregator reasoning block.
  const finalThink = document.createElement("details");
  finalThink.className = "think";
  const fr = turn.final?.reasoning || "";
  finalThink.style.display = fr ? "" : "none";
  finalThink.innerHTML = `<summary><span class="arrow">▸</span> ${T.thinking}</summary><div class="think-body"></div>`;
  if (fr) finalThink.querySelector(".think-body").innerHTML = md(fr);
  finalWrap.appendChild(finalThink);

  // Aggregator tool calls for static rebuild.
  const aggTools = (Array.isArray(turn.final?.toolCalls) ? turn.final.toolCalls : []);
  if (aggTools.length) {
    const toolsWrap = document.createElement("div");
    aggTools.forEach((tc) => {
      const labelMap = { web_search: T.toolWebSearch, fetch_page: T.toolFetchPage };
      let ap; try { ap = JSON.stringify(JSON.parse(tc.arguments || "")); } catch { ap = tc.arguments || ""; }
      toolsWrap.insertAdjacentHTML("beforeend", makeToolChipStatic(labelMap[tc.name] || tc.name, ap, tc.result, tc.error));
    });
    finalThink.insertAdjacentElement("afterend", toolsWrap);
  }

  const finalBody = document.createElement("div");
  finalBody.className = "md";
  if (turn.final?.content && turn.final.content.trim()) {
    finalBody.innerHTML = md(turn.final.content);
  } else if (turn.final?.error) {
    finalBody.innerHTML = `<span class="err">${T.aggError(esc(turn.final.error))}</span>`;
  } else {
    finalBody.innerHTML = `<span class="err">${T.noAnswer}</span>`;
  }
  finalWrap.appendChild(finalBody);
  inner.appendChild(finalWrap);

  // Pre-fill cards for each layer.
  refLayers.forEach((layer, i) => {
    const cards = layerEls[i]?.cards;
    if (!cards) return;
    layer.forEach((r) => {
      const card = document.createElement("div");
      card.className = "card" + (r.isAgg ? " agg" : "");
      const tag = r.isAgg ? ` <span class="agg-tag">${T.agg}</span>` : "";
      const tTag = r.thinking ? " �" : "";
      const sTag = r.search ? " �" : "";
      const thinkHtml = r.reasoning
        ? `<details class="think"><summary><span class="arrow">▸</span> ${T.thinking}</summary><div class="think-body md">${md(r.reasoning)}</div></details>`
        : "";
      const toolsHtml = (Array.isArray(r.toolCalls) && r.toolCalls.length)
        ? r.toolCalls.map((tc) => {
            const labelMap = { web_search: T.toolWebSearch, fetch_page: T.toolFetchPage };
            let ap; try { ap = JSON.stringify(JSON.parse(tc.arguments || "")); } catch { ap = tc.arguments || ""; }
            return makeToolChipStatic(labelMap[tc.name] || tc.name, ap, tc.result, tc.error);
          }).join("")
        : "";
      let outHtml;
      if (r.error) outHtml = `<div class="out"><span class="err">${T.callFailed(esc(r.error))}</span></div>`;
      else if (r.content && r.content.trim()) outHtml = `<div class="out md">${md(r.content)}</div>`;
      else outHtml = `<div class="out"><span class="err">${T.noAnswer}</span></div>`;
      card.innerHTML = `<div class="name">${esc(r.vendor)} · ${esc(r.model)}${tTag}${sTag}${tag}</div>${thinkHtml}${toolsHtml}${outHtml}`;
      cards.appendChild(card);
    });
  });

  setupAutoCollapseLayers(finalWrap, layerEls);
}

// Recreate the entire conversation DOM when switching conversations.
function renderConversation(conv) {
  elMessages.innerHTML = "";
  if (!conv) return;
  for (const turn of conv.turns) {
    try { renderStaticTurn(turn); } catch (e) { console.warn("Failed to rebuild turn", e); }
  }
  elMessages.scrollTop = elMessages.scrollHeight; // Stay at the bottom after switching.
}

function scrollDown() {
  // Auto-scroll only when the user is already near the bottom, so streaming output
  // does not pull them away while they inspect reference cards.
  const el = elMessages;
  const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 160;
  if (nearBottom) el.scrollTop = el.scrollHeight;
}

// Collapse all reference layers above finalWrap when the final answer area enters the viewport.
// IntersectionObserver avoids global scroll handlers and their performance/jitter issues.
function setupAutoCollapseLayers(finalWrap, layerEls) {
  if (!("IntersectionObserver" in window) || !layerEls.length) return;
  const io = new IntersectionObserver((entries) => {
    for (const ent of entries) {
      if (ent.isIntersecting && ent.boundingClientRect.top <= elMessages.clientHeight) {
        // Once the aggregator area reaches the viewport, collapse this block's reference layers.
        layerEls.forEach(({ det }) => { if (det) det.open = false; });
      }
    }
  }, { root: elMessages, threshold: [0, 0.01] });
  io.observe(finalWrap);
}

/* ============================ Events ============================ */
async function send() {
  if (busy) return;
  syncCfg();
  saveConfig();
  const text = elInput.value.trim();
  if (!text) return;
  const missing = cfg.rows.find(r => !r.baseUrl || !r.apiKey || !r.model);
  if (missing) { alert(T.configIncomplete(missing.vendor || "?")); return; }

  // Ensure a current conversation exists; create one on first use or after all were deleted.
  if (!currentConv()) newConversation();

  busy = true;
  elSend.disabled = true;
  elInput.value = "";
  autoGrow();

  addUserMessage(text);
  const ui = renderMoaBlock();
  try {
    await runMoATurn(text, ui);
  } catch (e) {
    ui.setError(T.runError(e.message));
    console.error(e);
  } finally {
    busy = false;
    elSend.disabled = false;
    elInput.focus();
  }
}

function autoGrow() {
  elInput.style.height = "auto";
  elInput.style.height = Math.min(200, elInput.scrollHeight) + "px";
}

elInput.addEventListener("input", autoGrow);
elInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
elSend.addEventListener("click", send);
$("addModel").addEventListener("click", addModel);
function startNewChat() {
  if (busy) { alert(T.generatingWait); return; }
  // Avoid creating duplicate empty conversations.
  const cur = currentConv();
  if (cur && cur.turns.length === 0) { closeMobileSidebar(); elInput.focus(); return; }
  newConversation();
}
$("newChat").addEventListener("click", startNewChat);
$("newChatTop").addEventListener("click", startNewChat);
elShowProcess.addEventListener("change", () => { syncCfg(); saveConfig(); });
elLayers.addEventListener("change", () => { syncCfg(); saveConfig(); updateStatus(); });
elFirecrawlKey.addEventListener("blur", () => { syncCfg(); saveConfig(); });
$("toggleHistory").addEventListener("click", toggleHistorySidebar);
$("closeHistory").addEventListener("click", closeMobileSidebar);
$("sidebarBackdrop").addEventListener("click", closeMobileSidebar);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeMobileSidebar();
});
if (mobileSidebarQuery.addEventListener) {
  mobileSidebarQuery.addEventListener("change", handleLayoutChange);
} else if (mobileSidebarQuery.addListener) {
  mobileSidebarQuery.addListener(handleLayoutChange);
}
// The settings panel is embedded at the bottom of the history sidebar and controlled by <details>.
$("settingsDrawer").addEventListener("toggle", () => { /* <details> handles its own state changes. */ });
function collapseSettingsDrawer() { const d = $("settingsDrawer"); if (d) d.open = false; }
function isMobileLayout() { return mobileSidebarQuery.matches; }
function closeMobileSidebar() { document.body.classList.remove("sidebar-open"); }
function toggleHistorySidebar() {
  const sidebar = $("historybar");
  if (isMobileLayout()) {
    sidebar.classList.remove("collapsed");
    document.body.classList.toggle("sidebar-open");
  } else {
    closeMobileSidebar();
    sidebar.classList.toggle("collapsed");
  }
}
function handleLayoutChange() {
  if (!isMobileLayout()) closeMobileSidebar();
}

/* ============================ Startup ============================ */
function init() {
  applyI18n();   // Apply static localized copy first.
  if (!loadConfig()) { cfg.rows = deepClone(DEFAULT_ROWS); cfg.aggIndex = 0; }
  elLayers.value = cfg.layers;
  elShowProcess.checked = cfg.showProcess;
  elFirecrawlKey.value = cfg.firecrawlKey || "";
  renderTable();
  syncCfg();
  // Load conversation history, or create one empty conversation if none exists.
  if (!loadConversations()) {
    newConversation();
  } else {
    rebuildMessageList();
    renderConversation(currentConv());
    renderHistoryList();
  }
  collapseSettingsDrawer();   // Keep settings collapsed on startup.
  updateStatus();
  autoGrow();
}
init();
</script>
</body>
</html>
